<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致琤清：岁华新至</title>
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-base: #f4efdf;
            --ink-black: #2c2c2c;
            --deep-red: #8b2a2a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 背景必须为黑，烟花才好看 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'ZCOOL XiaoWei', serif;
        }

        /* 烟花画布层 */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 位于背景之上，信纸之下 */
        }

        /* --- 开场信封 --- */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background: #e5dec9;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #c0b080;
            transition: all 1s ease;
            z-index: 10;
        }

        .seal {
            width: 70px;
            height: 70px;
            background: var(--deep-red);
            border-radius: 50%;
            border: 2px solid #c5a059;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #c5a059;
            font-family: 'Ma+Shan+Zheng', cursive;
            font-size: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        /* --- 古风信纸主体 --- */
        #letter {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 520px;
            height: 85vh;
            background: var(--paper-base);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            padding: 50px;
            box-sizing: border-box;
            border: 2px solid #3d3d3d;
            outline: 12px solid var(--paper-base);
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            z-index: 100;
            overflow-y: auto;
            opacity: 0;
            transition: all 1.5s ease;
        }

        #letter.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .character-img {
            float: right;
            width: 140px;
            margin-left: 20px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            padding: 5px;
            background: white;
            filter: contrast(1.1);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .text-content {
            font-size: 1.25rem;
            line-height: 2.2;
            color: var(--ink-black);
            white-space: pre-wrap;
            letter-spacing: 2px;
        }

        .signature {
            margin-top: 50px;
            text-align: right;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.4rem;
            color: var(--deep-red);
            opacity: 0;
            transition: 3s;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            cursor: pointer;
            color: #999;
            font-size: 12px;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        #letter::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>
    <audio id="myAudio" src="bgm.mp3" loop></audio>

    <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
        <div class="seal">齐启</div>
        <p style="position:absolute; bottom:20px; color:#7d6a4a; font-size:12px; letter-spacing:4px;">岁岁年年 · 琤清</p>
    </div>

    <div id="letter">
        <span class="close-btn" onclick="location.reload()">[ 重置 ]</span>
        <img src="qisili.jpg" alt="齐司礼" class="character-img">
        <div id="typewriter" class="text-content"></div>
        <div class="signature" id="sig">—— 齐司礼</div>
    </div>

    <script>
        // --- 🎆 烟花粒子引擎核心代码 ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.sx = this.x;
                this.sy = this.y;
                this.tx = Math.random() * canvas.width;
                this.ty = Math.random() * (canvas.height / 2);
                this.speed = 2;
                this.angle = Math.atan2(this.ty - this.sy, this.tx - this.sx);
                this.distanceToTarget = Math.sqrt(Math.pow(this.tx - this.sx, 2) + Math.pow(this.ty - this.sy, 2));
                this.distanceTraveled = 0;
                this.hue = Math.random() * 360;
            }
            update(index) {
                this.distanceTraveled = Math.sqrt(Math.pow(this.x - this.sx, 2) + Math.pow(this.y - this.sy, 2));
                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.tx, this.ty, this.hue);
                    fireworks.splice(index, 1);
                } else {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                    this.speed *= 1.03;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue + (Math.random() * 50 - 25);
                this.friction = 0.95;
                this.gravity = 0.7;
                this.speed = Math.random() * 10 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            update(index) {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                if (this.alpha <= this.decay) particles.splice(index, 1);
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - Math.cos(this.angle) * 5, this.y - Math.sin(this.angle) * 5);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 50%, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function createParticles(x, y, hue) {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // 形成拖尾效果的关键
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            
            fireworks.forEach((fw, i) => { fw.update(i); fw.draw(); });
            particles.forEach((p, i) => { p.update(i); p.draw(); });

            // 掌握节奏：随机发射
            if (Math.random() < 0.05) fireworks.push(new Firework());
        }
        loop();

        // --- 信件交互逻辑 ---
        const message = `琤清：\n\n又是新的一年。凡人总是热衷于在这些特定的日子里庆祝，仿佛只要翻过那一页日历，所有的烦忧都会随风而去。真是……幼稚得令人发笑。\n\n不过，既然是你想要的“仪式感”，我自然不会缺席。过去的一年，你依然那么冒冒失失，总是惹出不少麻烦。但在那些草木枯荣的间隙里，因为有你在侧，连那些漫长而枯燥的岁月，似乎也变得不那么难熬了。\n\n听说新年要许愿？那我的愿望，便是让你这只“笨鸟”，能在我目光所及的地方，继续自由自在地飞下去。岁岁年年，不仅仅是祝福。\n\n往后的每一个季节，我都会在你身边。`;

        function openLetter() {
            document.getElementById('myAudio').play().catch(()=>{});
            const env = document.getElementById('envelope');
            const letDiv = document.getElementById('letter');
            
            env.style.opacity = '0';
            env.style.transform = 'translateY(-100px) scale(0.5)';
            
            setTimeout(() => {
                env.style.display = 'none';
                letDiv.style.display = 'block';
                setTimeout(() => letDiv.classList.add('active'), 100);
                setTimeout(typeWriter, 1500);
            }, 800);
        }

        function typeWriter() {
            let i = 0;
            const elem = document.getElementById('typewriter');
            function type() {
                if (i < message.length) {
                    elem.innerHTML += message.charAt(i);
                    let char = message.charAt(i);
                    i++;
                    let delay = (char === '。' || char === '？') ? 700 : 120;
                    setTimeout(type, delay);
                } else {
                    document.getElementById('sig').style.opacity = '1';
                }
            }
            type();
        }
    </script>
</body>
</html>
